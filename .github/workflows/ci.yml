name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  arduino:
    name: Compile Arduino sketch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compile ESP32 sketch
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          platforms: |
            - name: esp32:esp32
              source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          libraries: "[]"
          sketch-paths: |
            - .

  python:
    name: Check Python client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compile Python files
        run: python -m py_compile tools/snake_client.py
